<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui">
    <title>Ma Manette Godot</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="login-screen">
        <h1>Course de Karts</h1>
        <input type="text" id="pseudo-input" placeholder="Ton pseudo..." maxlength="12">
        
        <select id="skin-select" style="margin-bottom: 15px; padding: 10px; font-size: 16px;">
            <option value="Rouge">Voiture Rouge</option>
            <option value="Bleue">Voiture Bleue</option>
            <option value="BleuTurquoise">Voiture Bleu Turquoise</option>
            <option value="Verte">Voiture Verte</option>
            <option value="Jaune">Voiture Jaune</option>
            <option value="Noire">Voiture Noire</option>
            <option value="Blanche">Voiture Blanche</option>
            <option value="NoirEtBlanche">Voiture Noir & Blanche</option>
            
            <option value="camion">Camion Tryhard</option>
        </select>
        
        <button id="btn-join">Rejoindre la partie</button>
    </div>

    <div class="controller-container" id="controller" style="display: none;">
        <div class="left-zone">
            <div class="steering-wrapper">
                <img src="assets/Volant_tryhard-removebg-preview.png" id="volant" alt="Volant" draggable="false">
            </div>
        </div>

        <div class="right-zone">
            <div id="brake" class="pedal brake-pedal">FREIN</div>
            <div id="accelerator" class="pedal gas-pedal">GAZ</div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <script src="index.js"></script>
</body></html>
