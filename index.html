<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Manette Kart - Joystick</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="login-screen">
        <h1>Course de Karts</h1>
        <input type="text" id="pseudo-input" placeholder="Ton pseudo..." maxlength="12">
        
        <select id="skin-select">
            <option value="Rouge">Voiture Rouge</option>
            <option value="Bleu">Voiture Bleue</option>
            <option value="BleuTurquoise">Voiture Bleu Turquoise</option>
            <option value="Verte">Voiture Verte</option>
            <option value="Jaune">Voiture Jaune</option>
            <option value="Noir">Voiture Noire</option>
            <option value="Rose">Voiture Rose</option>
            <option value="Orange">Voiture Orange</option>
            <option value="Blanche">Voiture Blanche</option>
            <option value="NoirEtBlanche">Voiture Noire et Blanche</option>
            <option value="camion">Camion</option>
        </select>
        
        <button id="btn-join">Rejoindre la partie</button>
    </div>

    <div class="controller-container" id="controller" style="display: none;">
        <div class="left-zone">
            <div id="joystick-container">
                <div id="joystick-base">
                    <div id="joystick-stick"></div>
                </div>
            </div>
        </div>

        <div class="right-zone">
            <div id="brake" class="pedal brake-pedal">FREIN</div>
            <div id="accelerator" class="pedal gas-pedal">GAZ</div>
        </div>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
